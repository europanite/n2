  <title>うんこが臭いので、窓を開けることにした。


学習ポイント: 文型：「[動詞]が[形容詞/副詞]ので、[補助構文]にすることにした。」は、状況の評価に基づいて行動を決定する表現です。

  <main>
    <p>うんこが臭いので、窓を開けることにした。


学習ポイント: 文型：「[動詞]が[形容詞/副詞]ので、[補助構文]にすることにした。」は、状況の評価に基づいて行動を決定する表現です。


英訳: I opened the window because the smell of poop was strong.</p>
    <p><strong>Study point:</strong> 文型：「[動詞]が[形容詞/副詞]ので、[補助構文]にすることにした。」は、状況の評価に基づいて行動を決定する表現です。</p>
    <p><strong>English:</strong> I opened the window because the smell of poop was strong.</p>
