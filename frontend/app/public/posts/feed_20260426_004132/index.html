  <title>今日の運動会でうんこが入った制服になった。


学習ポイント: 文型：副詞的形容詞句。例文では「うんこが」が使用されており、動詞「入った」の前に位置している。


英訳: Today&#x27;s sports meeting ended with a uniform that had poop in it.</title>
</head>
<body>
  <main>
    <p>今日の運動会でうんこが入った制服になった。


学習ポイント: 文型：副詞的形容詞句。例文では「うんこが」が使用されており、動詞「入った」の前に位置している。


英訳: Today&#x27;s sports meeting ended with a uniform that had poop in it.</p>
    <p><strong>Study point:</strong> 文型：副詞的形容詞句。例文では「うんこが」が使用されており、動詞「入った」の前に位置している。</p>
    <p><strong>English:</strong> Today&#x27;s sports meeting ended with a uniform that had poop in it.</p>
  </main>
</body>
