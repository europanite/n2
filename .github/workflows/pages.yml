name: Pages

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: "main"
      state_artifact_name:
        description: "Optional upstream state artifact name"
        required: false
        type: string
        default: ""
      artifact_run_id:
        description: "Optional run id that owns the upstream artifact"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore upstream pages state
        if: ${{ inputs.state_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.state_artifact_name }}
          path: /tmp/pages-state
          run-id: ${{ inputs.artifact_run_id != '' && inputs.artifact_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Expand upstream pages state
        if: ${{ inputs.state_artifact_name != '' }}
        run: |
          set -euo pipefail
          mkdir -p frontend/app/public
          tar -C frontend/app/public -xzf /tmp/pages-state/pages-state.tgz

      - name: Generate latest.json
        run: |
          set -euo pipefail
          python scripts/generate_pages.py

      - name: Show latest.json
        run: |
          set -euo pipefail
          echo "===== frontend/app/public/latest.json ====="
          cat frontend/app/public/latest.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json

      - name: Install frontend deps
        working-directory: frontend/app
        run: |
          set -euo pipefail
          npm ci

      - name: Export frontend web build
        working-directory: frontend/app
        env:
          CI: "1"
        run: |
          set -euo pipefail
          npx expo export --platform web --output-dir web-build

      - name: Copy public resources into web-build
        run: |
          set -euo pipefail
          cp -a frontend/app/public/. frontend/app/web-build/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/app/web-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
