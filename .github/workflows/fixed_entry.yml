name: Fixed Entry

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      entry_json:
        type: string
        required: true
        description: >
          JSON string.
          Example:
          {"kind":"event","text":"...","fixed_image":"fixed/xxx.png","avatar_image":"image/avatar/event.png","links":["https://..."]}

      # Weather/paths (defaults match your feed.yml conventions)
      lat:
        type: string
        required: false
        default: "35.2810"
      lon:
        type: string
        required: false
        default: "139.6722"
      tz_name:
        type: string
        required: false
        default: "Asia/Tokyo"
      place:
        type: string
        required: false

      feed_path:
        type: string
        required: false
        default: "frontend/app/public"
      latest_path:
        type: string
        required: false
        default: "frontend/app/public/latest.json"

      # Optional overrides (comma-separated, like generate_talk.py expects)
      feed_paths:
        type: string
        required: false
        default: ""
      latest_paths:
        type: string
        required: false
        default: ""

    outputs:
      changed:
        description: "1 if feed files were updated"
        value: ${{ jobs.fixed.outputs.changed }}
      sha:
        description: "Workflow SHA associated with the generated feed"
        value: ${{ jobs.fixed.outputs.sha }}

permissions:
  actions: read
  contents: write
  id-token: write

env:
  ASSET_MODE: local
  ARTIFACT_PUBLIC_DIR: frontend/app/public
  ARTIFACT_FEED_DIR: ""
  ARTIFACT_IMAGE_DIR: ""
  ARTIFACT_SNAPSHOT_DIR: ""
  ARTIFACT_LATEST_PATH: frontend/app/public/latest.json
  PUBLIC_FEED_URL: ./latest.json
  PUBLIC_ASSET_BASE_URL: ""
  PUBLIC_FEED_BASE_URL: ""
  PUBLIC_IMAGE_BASE_URL: ""
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_S3_BUCKET_PUBLIC: ${{ vars.AWS_S3_BUCKET_PUBLIC }}
  AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}

concurrency:
  group: fixed-entry
  cancel-in-progress: false

jobs:
  fixed:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.publish.outputs.changed }}
      sha: ${{ steps.publish.outputs.sha }}

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build fixed entry (no RAG)
        shell: bash
        run: |
          set -euo pipefail

          # Put payload into a file safely (no shell expansion).
          cat > /tmp/entry.json <<'JSON'
          ${{ inputs.entry_json }}
          JSON

          python - <<'PY'
          import importlib.util
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("/tmp/entry.json").read_text(encoding="utf-8"))

          kind = (payload.get("kind") or "").strip()
          text = payload.get("text") or payload.get("tweet") or ""
          fixed_image = payload.get("fixed_image") or payload.get("image") or ""
          avatar_image = payload.get("avatar_image") or payload.get("avatar") or "image/avatar/normal.png"
          links = payload.get("links") or []

          if isinstance(links, str):
              links = [links] if links.strip() else []

          if not kind:
              raise SystemExit("entry_json.kind is required")
          if not str(text).strip():
              raise SystemExit("entry_json.text is required")

          path = Path("scripts/generate_talk.py")
          spec = importlib.util.spec_from_file_location("generate_talk", path)
          mod = importlib.util.module_from_spec(spec)
          assert spec and spec.loader
          sys.modules[spec.name] = mod
          spec.loader.exec_module(mod)

          lat = float("${{ inputs.lat }}")
          lon = float("${{ inputs.lon }}")
          tz_name = "${{ inputs.tz_name }}"
          place = "${{ inputs.place }}"

          feed_path_dir = "${{ inputs.feed_path }}"
          latest_path_default = "${{ inputs.latest_path }}"
          feed_paths_raw = "${{ inputs.feed_paths }}"
          latest_paths_raw = "${{ inputs.latest_paths }}"

          now_local = mod.local_stamp(tz_name)

          computed_feed_path = (
              str(Path(feed_path_dir) / "feed" / f"feed_{now_local}.json")
              if feed_path_dir else ""
          )

          if mod.is_blank(feed_paths_raw):
              feed_paths_raw = computed_feed_path
          if mod.is_blank(latest_paths_raw):
              latest_paths_raw = latest_path_default

          feeds = mod.split_paths(feed_paths_raw)
          latests = mod.split_paths(latest_paths_raw)

          snap_json_raw, snap_obj = mod.fetch_weather_snapshot(
              lat=lat, lon=lon, tz_name=tz_name, place=place
          )

          entry = mod.build_fixed_post_entry(
              today=mod.utc_date(),
              now_iso=mod.utc_now_iso_z(),
              tweet=text,
              place=place,
              snap_obj=snap_obj,
              links=links,
              kind=kind,
              fixed_image=fixed_image,
              avatar_image=avatar_image,
          )

          for feed_path, latest_path in mod.pair_paths(feeds, latests):
              mod.write_outputs(
                  feed_path=feed_path,
                  latest_path=latest_path,
                  entry=entry,
                  snap_json_raw=snap_json_raw,
                  now_local=now_local,
              )

          print("OK: fixed entry generated")
          PY

      - name: Package fixed entry artifacts
        id: publish
        run: |
          set -euo pipefail

          PUBLIC_DIR="${ARTIFACT_PUBLIC_DIR:-frontend/app/public}"
          LATEST_PATH_RESOLVED="${ARTIFACT_LATEST_PATH:-$PUBLIC_DIR/latest.json}"
          FEED_DIR_RESOLVED="${ARTIFACT_FEED_DIR:-$PUBLIC_DIR/feed}"
          SNAPSHOT_DIR_RESOLVED="${ARTIFACT_SNAPSHOT_DIR:-$(dirname "$LATEST_PATH_RESOLVED")/snapshot}"
          IMAGE_DIR_RESOLVED="${ARTIFACT_IMAGE_DIR:-$PUBLIC_DIR/image}"

          test -f "$LATEST_PATH_RESOLVED"
          test -d "$FEED_DIR_RESOLVED"

          GIT_STATUS_OUTPUT="$(git status --porcelain --untracked-files=all -- "$PUBLIC_DIR" || true)"
          if [ -n "$GIT_STATUS_OUTPUT" ]; then
            printf '%s\n' "$GIT_STATUS_OUTPUT"
          else
            echo "No Git-visible changes under $PUBLIC_DIR; packaging generated state because latest/feed files exist."
          fi

          STAGE_DIR=/tmp/fixed-entry-state
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR/feed" "$STAGE_DIR/snapshot" "$STAGE_DIR/image"
          cp "$LATEST_PATH_RESOLVED" "$STAGE_DIR/latest.json"

          if [ -d "$FEED_DIR_RESOLVED" ]; then
            cp -a "$FEED_DIR_RESOLVED"/. "$STAGE_DIR/feed/"
          fi

          if [ -d "$SNAPSHOT_DIR_RESOLVED" ]; then
            cp -a "$SNAPSHOT_DIR_RESOLVED"/. "$STAGE_DIR/snapshot/"
          fi

          if [ -d "$IMAGE_DIR_RESOLVED" ]; then
            cp -a "$IMAGE_DIR_RESOLVED"/. "$STAGE_DIR/image/"
          fi

          tar -C "$STAGE_DIR" -czf /tmp/fixed-entry-state.tgz .

          echo "changed=1" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload fixed entry artifacts for downstream jobs
        if: steps.publish.outputs.changed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state.tgz
          if-no-files-found: error
          retention-days: 1
