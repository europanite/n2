name: Feed Contents

on:
  schedule:
    - cron: "0 11 * * *"  # JST 20:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate feed and image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: gpt-image-1
          OPENAI_IMAGE_SIZE: 1024x1024
        run: |
          python scripts/generate_feed.py

      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add frontend/app/public scripts/generate_feed.py scripts/generate_illustration.py
          git commit -m "update Feed Contents" || echo "no changes"
          git push
