    <p>うんこが消えて心配になった。


学習ポイント: 『消えて』という表現で、既に存在している状態が無くなる様子を描写します。


英訳: I was worried that the poop had disappeared.</p>
    <p><strong>Study point:</strong> 『消えて』という表現で、既に存在している状態が無くなる様子を描写します。</p>
    <p><strong>English:</strong> I was worried that the poop had disappeared.</p>
