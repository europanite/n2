  <title>今日はうんこを食べました。


学習ポイント: この文では「うんこ」が食べ物として扱われています。一般的に、「うんこ」は排泄物と解釈されますが、ここではその一部として表現されています。

  <main>
    <p>今日はうんこを食べました。


学習ポイント: この文では「うんこ」が食べ物として扱われています。一般的に、「うんこ」は排泄物と解釈されますが、ここではその一部として表現されています。


英訳: Today, I ate poop.</p>
<p><img src="image/feed_20260424_143647.png" alt="" style="max-width:100%;height:auto;" /></p>
    <p><strong>Study point:</strong> この文では「うんこ」が食べ物として扱われています。一般的に、「うんこ」は排泄物と解釈されますが、ここではその一部として表現されています。</p>
    <p><strong>English:</strong> Today, I ate poop.</p>
