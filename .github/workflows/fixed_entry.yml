name: Fixed Entry

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      entry_json:
        type: string
        required: true
        description: >
          JSON string.
          Example:
          {"kind":"event","text":"...","fixed_image":"fixed/xxx.png","avatar_image":"image/avatar/event.png","links":["https://..."]}

      # Weather/paths (defaults match your feed.yml conventions)
      lat:
        type: string
        required: false
        default: "35.2810"
      lon:
        type: string
        required: false
        default: "139.6722"
      tz_name:
        type: string
        required: false
        default: "Asia/Tokyo"
      place:
        type: string
        required: false

      feed_path:
        type: string
        required: false
        default: "frontend/app/public"
      latest_path:
        type: string
        required: false
        default: "frontend/app/public/latest.json"

      # Optional overrides (comma-separated, like generate_talk.py expects)
      feed_paths:
        type: string
        required: false
        default: ""
      latest_paths:
        type: string
        required: false
        default: ""

    outputs:
      changed:
        description: "1 if feed files were updated"
        value: ${{ jobs.fixed.outputs.changed }}
      sha:
        description: "Workflow SHA associated with the generated feed"
        value: ${{ jobs.fixed.outputs.sha }}

permissions:
  actions: read
  contents: write
  id-token: write

env:
  ASSET_MODE: local
  ARTIFACT_PUBLIC_DIR: frontend/app/public
  ARTIFACT_FEED_DIR: ""
  ARTIFACT_IMAGE_DIR: ""
  ARTIFACT_SNAPSHOT_DIR: ""
  ARTIFACT_LATEST_PATH: frontend/app/public/latest.json
  PUBLIC_FEED_URL: ./latest.json
  PUBLIC_ASSET_BASE_URL: ""
  PUBLIC_FEED_BASE_URL: ""
  PUBLIC_IMAGE_BASE_URL: ""
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_S3_BUCKET_PUBLIC: ${{ vars.AWS_S3_BUCKET_PUBLIC }}
  AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}

concurrency:
  group: fixed-entry
  cancel-in-progress: false

jobs:
  fixed:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.publish.outputs.changed }}
      sha: ${{ steps.publish.outputs.sha }}

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build fixed entry
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/entry.json <<'JSON'
          ${{ inputs.entry_json }}
          JSON

          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          from zoneinfo import ZoneInfo

          payload = json.loads(Path("/tmp/entry.json").read_text(encoding="utf-8"))

          kind = (payload.get("kind") or "").strip()
          text = (payload.get("text") or payload.get("tweet") or "").strip()
          fixed_image = (payload.get("fixed_image") or payload.get("image") or "").strip()
          avatar_image = (payload.get("avatar_image") or payload.get("avatar") or "image/avatar/normal.png").strip()
          links = payload.get("links") or []

          if isinstance(links, str):
              links = [links] if links.strip() else []

          if not kind:
              raise SystemExit("entry_json.kind is required")
          if not text:
              raise SystemExit("entry_json.text is required")

          tz_name = "${{ inputs.tz_name }}" or "Asia/Tokyo"
          tz = ZoneInfo(tz_name)

          now_utc = datetime.now(timezone.utc)
          now_local = now_utc.astimezone(tz)

          now_iso = now_utc.replace(microsecond=0).isoformat().replace("+00:00", "Z")
          today_local = now_local.date().isoformat()
          stamp_local = now_local.strftime("%Y%m%d_%H%M%S")

          place = "${{ inputs.place }}".strip()

          entry = {
              "id": f"fixed-{kind}-{stamp_local}",
              "kind": kind,
              "date": today_local,
              "created_at": now_iso,
              "text": text,
              "tweet": text,
              "place": place,
              "links": links,
              "avatar_image": avatar_image,
          }

          if fixed_image:
              entry["image"] = fixed_image
              entry["fixed_image"] = fixed_image

          latest_path = Path("${{ inputs.latest_path }}")
          feed_root = Path("${{ inputs.feed_path }}")
          feed_dir = feed_root / "feed"
          snapshot_dir = feed_root / "snapshot"

          latest_path.parent.mkdir(parents=True, exist_ok=True)
          feed_dir.mkdir(parents=True, exist_ok=True)
          snapshot_dir.mkdir(parents=True, exist_ok=True)

          feed_path = feed_dir / f"feed_{stamp_local}.json"

          latest_path.write_text(
              json.dumps(entry, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          feed_payload = [entry]
          feed_path.write_text(
              json.dumps(feed_payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          snapshot = {
              "generated_at": now_iso,
              "timezone": tz_name,
              "place": place,
          }
          (snapshot_dir / f"snapshot_{stamp_local}.json").write_text(
              json.dumps(snapshot, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          print("OK: fixed entry generated without generate_talk.py")
          PY

      - name: Commit generated public state
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --ff-only origin main

          git add frontend/app/public/latest.json
          git add frontend/app/public/feed
          git add frontend/app/public/snapshot

          if [ -d frontend/app/public/image ]; then
            git add frontend/app/public/image
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: append generated public feed state"
          git push origin HEAD:main

      - name: Package fixed entry artifacts
        id: publish
        run: |
          set -euo pipefail

          PUBLIC_DIR="${ARTIFACT_PUBLIC_DIR:-frontend/app/public}"
          LATEST_PATH_RESOLVED="${ARTIFACT_LATEST_PATH:-$PUBLIC_DIR/latest.json}"
          FEED_DIR_RESOLVED="${ARTIFACT_FEED_DIR:-$PUBLIC_DIR/feed}"
          SNAPSHOT_DIR_RESOLVED="${ARTIFACT_SNAPSHOT_DIR:-$(dirname "$LATEST_PATH_RESOLVED")/snapshot}"
          IMAGE_DIR_RESOLVED="${ARTIFACT_IMAGE_DIR:-$PUBLIC_DIR/image}"

          test -f "$LATEST_PATH_RESOLVED"
          test -d "$FEED_DIR_RESOLVED"

          GIT_STATUS_OUTPUT="$(git status --porcelain --untracked-files=all -- "$PUBLIC_DIR" || true)"
          if [ -n "$GIT_STATUS_OUTPUT" ]; then
            printf '%s\n' "$GIT_STATUS_OUTPUT"
          else
            echo "No Git-visible changes under $PUBLIC_DIR; packaging generated state because latest/feed files exist."
          fi

          STAGE_DIR=/tmp/fixed-entry-state
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR/feed" "$STAGE_DIR/snapshot" "$STAGE_DIR/image"
          cp "$LATEST_PATH_RESOLVED" "$STAGE_DIR/latest.json"

          if [ -d "$FEED_DIR_RESOLVED" ]; then
            cp -a "$FEED_DIR_RESOLVED"/. "$STAGE_DIR/feed/"
          fi

          if [ -d "$SNAPSHOT_DIR_RESOLVED" ]; then
            cp -a "$SNAPSHOT_DIR_RESOLVED"/. "$STAGE_DIR/snapshot/"
          fi

          if [ -d "$IMAGE_DIR_RESOLVED" ]; then
            cp -a "$IMAGE_DIR_RESOLVED"/. "$STAGE_DIR/image/"
          fi

          tar -C "$STAGE_DIR" -czf /tmp/fixed-entry-state.tgz .

          echo "changed=1" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload fixed entry artifacts for downstream jobs
        if: steps.publish.outputs.changed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state.tgz
          if-no-files-found: error
          retention-days: 1
