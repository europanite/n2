  <main>
    <p>うんこを食べると大変だよ。


学習ポイント: 「うんこを食べる」は俗語で、実際にはうんこを口に含んだり食べたことはありません。正しい表現は「便（べん）を食べることはありません」です。


英訳: To eat feces is very bad.</p>
<p><img src="image/feed_20260424_212754.png" alt="" style="max-width:100%;height:auto;" /></p>
    <p><strong>Study point:</strong> 「うんこを食べる」は俗語で、実際にはうんこを口に含んだり食べたことはありません。正しい表現は「便（べん）を食べることはありません」です。</p>
    <p><strong>English:</strong> To eat feces is very bad.</p>
