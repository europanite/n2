services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./.cache/chroma:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped
  illustrate:
    build:
      context: ./illustrate
      dockerfile: Dockerfile
    container_name: illustrate
    tty: true
    working_dir: /repo
    volumes:
      - ./:/repo
      - ${HF_CACHE_DIR:-hf_cache}:/root/.cache/huggingface
      - ${TORCH_CACHE_DIR:-torch_cache}:/root/.cache/torch
    environment:
      FEED_PATH: frontend/app/public
      LATEST_PATH: frontend/app/public/latest.json
      MODEL_ID: ${MODEL_ID:-stabilityai/sdxl-turbo}
      SDXL_MODEL_ID: ${SDXL_MODEL_ID:-}
      LORA_PATH: ${LORA_PATH:-}
      LORA_SCALE: ${LORA_SCALE:-0.8}
      INPUT_IMAGE: ${INPUT_IMAGE:-}
      MODE: ${MODE:-pillow}
      STYLE: ${STYLE:-grade}
      PATCH_JSON: ${PATCH_JSON:-1}
      OUT_DIR: ${OUT_DIR:-frontend/app/public/image}
      OUT_NAME: ${OUT_NAME:-}
      STEPS: ${STEPS:-2}
      STRENGTH: ${STRENGTH:-0.8}
      GUIDANCE_SCALE: ${GUIDANCE_SCALE:-2.0}
      MIRROR_AUG: ${MIRROR_AUG:-0}
      SEED: ${SEED:-}
      SEED_OFFSET: ${SEED_OFFSET:-0}
      PAGE_W: ${PAGE_W:-640}
      PAGE_H: ${PAGE_H:-480}
      SD_W: ${SD_W:-0}
      SD_H: ${SD_H:-0}
      DEVICE: ${DEVICE:-auto}
      TORCH_NUM_THREADS: ${TORCH_NUM_THREADS:-0}
      PROMPT: ${PROMPT:-}
      NEGATIVE: ${NEGATIVE:-}
    command: ["sh", "illustrate/app/run.sh"]
    restart: "no"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    working_dir: /app
    tty: true
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      BACKEND_PORT: ${BACKEND_PORT}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_EXPIRE_MINUTES: ${AUTH_EXPIRE_MINUTES}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_CHAT_TIMEOUT: ${OLLAMA_CHAT_TIMEOUT:-300}
      RAG_MODEL: ${RAG_MODEL}
      AUDIT_MODEL: ${AUDIT_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      CHROMA_DB_DIR: ${CHROMA_DB_DIR}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME}
      OLLAMA_TIMEOUT_S: ${OLLAMA_TIMEOUT_S}
      DOCS_DIR: ${DOCS_DIR}
      RAG_AUTO_INDEX: ${RAG_AUTO_INDEX}
      RAG_REBUILD_ON_START: ${RAG_REBUILD_ON_START}
      RAG_INDEX_FAIL_FAST: ${RAG_INDEX_FAIL_FAST}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      TZ_NAME: ${TZ_NAME}
      HASHTAGS: ${HASHTAGS}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-127.0.0.1}
      FEED_PATH: ${FEED_PATH}
      LATEST_PATH: ${LATEST_PATH}
      RAG_AUDIT: ${RAG_AUDIT}
      RAG_AUDIT_REWRITE: ${RAG_AUDIT_REWRITE}
      RAG_AUDIT_MAX_ATTEMPTS: ${RAG_AUDIT_MAX_ATTEMPTS}
      OLLAMA_NUM_THREAD: ${OLLAMA_NUM_THREAD:-4}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-128}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.8}
      UNKO_PROMPT_PATH: ${UNKO_PROMPT_PATH:-/local/prompt.txt}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./backend/app
        target: /app
      - type: bind
        source: ./data/json
        target: /data/json
        read_only: true
      - type: bind
        source: ./chroma_db
        target: /chroma
      - type: bind
        source: ./scripts
        target: /scripts
      - type: bind
        source: ./local
        target: /local
        read_only: true
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    working_dir: /app
    stdin_open: true
    tty: true
    environment:
      EXPO_TUNNEL: ${EXPO_TUNNEL:-0.0.0.0}
      EXPO_DEVTOOLS_LISTEN_ADDRESS: ${EXPO_DEVTOOLS_LISTEN_ADDRESS}
      EXPO_PUBLIC_API_HOST: ${EXPO_PUBLIC_API_HOST:-127.0.0.1}
      EXPO_PUBLIC_API_PORT: ${EXPO_PUBLIC_API_PORT:-8000}
      EXPO_PUBLIC_API_BASE: ${EXPO_PUBLIC_API_BASE:-http://127.0.0.1:8000}
      EXPO_PUBLIC_FEED_URL: ${EXPO_PUBLIC_FEED_URL:-./latest.json}
      EXPO_PUBLIC_GA_MEASUREMENT_ID: ${EXPO_PUBLIC_GA_MEASUREMENT_ID:-}
      REACT_NATIVE_PACKAGER_HOSTNAME: ${REACT_NATIVE_PACKAGER_HOSTNAME:-127.0.0.1}
      EXPO_PUBLIC_FEEDBACK_FORM_URL: ${EXPO_PUBLIC_FEEDBACK_FORM_URL}
      EXPO_PUBLIC_ADS_FORM_URL: ${EXPO_PUBLIC_ADS_FORM_URL}
      EXPO_PUBLIC_USE_SLOT: ${EXPO_PUBLIC_USE_SLOT}
      EXPO_PUBLIC_FEED_JSON_URL: ${EXPO_PUBLIC_FEED_JSON_URL}
      EXPO_PUBLIC_SHARE_SD_INDEX_URL: ${EXPO_PUBLIC_SHARE_SD_INDEX_URL}
      EXPO_PUBLIC_SLOT_ROTATE_MS: ${EXPO_PUBLIC_SLOT_ROTATE_MS}
      EXPO_PUBLIC_SLOT_FADE_MS: ${EXPO_PUBLIC_SLOT_FADE_MS}
    ports:
      - "19000:19000"  # Expo dev server (Metro)
      - "19001:19001"  # React Native debugger(old)
      - "19002:19002"  # Expo web UI
      - "8081:8081"    # Metro bundler
    volumes:
      - ./frontend/app:/app
      - /app/node_modules
    depends_on:
      - backend
    command: ["npx", "expo", "start", "--tunnel"]

  ollama:
    image: ollama/ollama:0.13.5
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
      - ./.cache/ollama:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c", "\
      ollama serve & \
      sleep 5 && \
      ollama pull ${EMBEDDING_MODEL} && \
      ollama pull ${RAG_MODEL} && \
      wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama show ${EMBEDDING_MODEL} >/dev/null 2>&1 && ollama show ${RAG_MODEL} >/dev/null 2>&1"]
      interval: 20s
      timeout: 20s
      retries: 60

  llm_finetune:
    build:
      context: ./llm_finetune
      dockerfile: Dockerfile
    container_name: llm_finetune
    working_dir: /repo
    tty: true
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      BASE_MODEL_ID: ${BASE_MODEL_ID:-meta-llama/Llama-3.1-8B-Instruct}
      DATA_PATH: ${DATA_PATH:-data/llm_sft/train.jsonl}
      OUTPUT_DIR: /repo/models/ollama/llama3.1_8b_lora
      OLLAMA_BASE_MODEL: ${OLLAMA_BASE_MODEL:-qwen3:8b}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-}
      LOAD_IN_4BIT: ${LOAD_IN_4BIT:-1}
      BF16: ${BF16:-1}
      MAX_SEQ_LEN: ${MAX_SEQ_LEN:-1024}
      LR: ${LR:-2e-4}
      BATCH_SIZE: ${BATCH_SIZE:-1}
      GRAD_ACCUM: ${GRAD_ACCUM:-8}
      NUM_EPOCHS: ${NUM_EPOCHS:-1}
      LORA_R: ${LORA_R:-16}
      LORA_ALPHA: ${LORA_ALPHA:-32}
      LORA_DROPOUT: ${LORA_DROPOUT:-0.05}
      SEED: ${SEED:-42}
    volumes:
      - ./:/repo
      - type: bind
        source: ./models
        target: /repo/models
      - ${HF_CACHE_DIR:-hf_cache}:/root/.cache/huggingface
      - ${TORCH_CACHE_DIR:-torch_cache}:/root/.cache/torch
    command: ["python", "llm_finetune/train_sft_lora.py"]
    restart: "no"

  ollama_import:
    image: ollama/ollama:0.13.5
    container_name: ollama_import
    working_dir: /repo
    tty: true
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1_8b_lora}
      OLLAMA_BASE_MODEL: ${OLLAMA_BASE_MODEL:-qwen3:8b}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-}
    volumes:
      - type: bind
        source: ./models
        target: /repo/models
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
      - |
          set -eu
          adapter_path="/repo/models/ollama/llama3.1_8b_lora/adapter_model.safetensors"
          test -f "$adapter_path"
          tmp_modelfile="$(mktemp)"
          {
            printf 'FROM %s\n' "$1"
            printf 'ADAPTER %s\n' "$adapter_path"
            if [ -n "$3" ]; then
              printf 'SYSTEM """%s"""\n' "$3"
            fi
          } > "$tmp_modelfile"
          ollama create "$2" -f "$tmp_modelfile"
      - sh
      - "${OLLAMA_BASE_MODEL}"
      - "${OLLAMA_MODEL}"
      - "${SYSTEM_PROMPT:-}"
    restart: "no"
volumes:
  db_data:
  ollama:
  hf_cache:
  torch_cache: