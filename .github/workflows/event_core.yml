name: Event Core

on:
  workflow_call:
    inputs:
      avatar_image:
        description: "Avatar image path under public/"
        required: false
        type: string
        default: "image/avatar/event.png"
    outputs:
      changed:
        description: "1 if feed files were updated"
        value: ${{ jobs.illustrate.outputs.changed }}
      sha:
        description: "Commit SHA that contains the generated feed"
        value: ${{ jobs.illustrate.outputs.sha }}

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list >/dev/null 2>&1 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    outputs:
      changed: ${{ steps.generate.outputs.changed }}
      entry_json: ${{ steps.payload.outputs.entry_json }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Select Ollama model
        run: |
          set -euo pipefail
          echo "OLLAMA_CHAT_MODEL=qwen2.5:3b-instruct" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install requests

      - name: Wait for Ollama API
        run: |
          set -euo pipefail
          for _ in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Ollama API did not become ready on http://127.0.0.1:11434" >&2
          docker ps >&2 || true
          exit 1

      - name: Pull Ollama model
        run: |
          set -euo pipefail
          curl --fail --show-error \
            -H 'Content-Type: application/json' \
            http://127.0.0.1:11434/api/pull \
            -d "{\"name\":\"${OLLAMA_CHAT_MODEL}\",\"stream\":false}"

      - name: Warm up Ollama model
        run: |
          set -euo pipefail
          python - <<'PY' >/tmp/ollama_warmup.json
          import json
          import os

          payload = {
              "model": os.environ["OLLAMA_CHAT_MODEL"],
              "stream": False,
              "format": "json",
              "options": {"temperature": 0},
              "messages": [
                  {
                      "role": "user",
                      "content": 'Return only this JSON: {"ok": true}'
                  }
              ],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY

          cat /tmp/ollama_warmup.json

          curl --fail --show-error \
            -H 'Content-Type: application/json' \
            http://127.0.0.1:11434/api/chat \
            --data-binary @/tmp/ollama_warmup.json >/dev/null

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: Generate future event payload
        id: generate
        env:
          OLLAMA_BASE_URL: "http://127.0.0.1:11434"
          OLLAMA_MODEL: ${{ env.OLLAMA_CHAT_MODEL }}
          PROMPT_PATH: "scripts/prompt.txt"
          REQUEST_TIMEOUT: "300"
          MAX_RETRIES: "3"
          AVATAR_IMAGE: ${{ inputs.avatar_image }}
        run: |
          set -euo pipefail

          python scripts/generate_sentence.py | tee /tmp/event_sentence_raw.txt
          sentence="$(tail -n 1 /tmp/event_sentence_raw.txt | tr -d '\r')"

          if [ -z "${sentence}" ]; then
            echo "Generated sentence is empty" >&2
            echo "changed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          sentence = Path("/tmp/event_sentence_raw.txt").read_text(encoding="utf-8").splitlines()[-1].strip()
          payload = {
              "kind": "event",
              "text": sentence,
              "avatar_image": os.environ.get("AVATAR_IMAGE", "image/avatar/event.png"),
              "links": [],
          }

          Path("/tmp/event_entry.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          echo "changed=1" >> "$GITHUB_OUTPUT"

      - name: Export entry_json
        id: payload
        if: steps.generate.outputs.changed == '1'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload_path = Path("/tmp/event_entry.json")
          if not payload_path.exists():
              raise SystemExit(f"event entry JSON was not created: {payload_path}")

          payload = json.loads(payload_path.read_text(encoding='utf-8'))
          compact = json.dumps(payload, ensure_ascii=False)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"entry_json={compact}\n")
          PY

  fixed:
    needs: prepare
    if: needs.prepare.outputs.changed == '1'
    uses: ./.github/workflows/fixed_entry.yml
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      entry_json: ${{ needs.prepare.outputs.entry_json }}
    secrets: inherit

  illustrate:
    needs: fixed
    if: needs.fixed.outputs.changed == '1'
    runs-on: ubuntu-latest
    env:
      BACKEND_PORT: "8000"
      AUTH_SECRET: ""
      AUTH_EXPIRE_MINUTES: "60"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "app_db"
      DB_USER: "app_user"
      DB_PASS: "app_pass"
      DATABASE_URL: "postgresql+psycopg[binary]://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

      EXPO_TUNNEL: "false"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      EXPO_PUBLIC_API_HOST: "127.0.0.1"
      EXPO_PUBLIC_API_PORT: "8000"
      EXPO_PUBLIC_API_BASE: "http://127.0.0.1:8000"
      EXPO_PUBLIC_FEED_URL: "./latest.json"
      EXPO_PUBLIC_GA_MEASUREMENT_ID: ""

      OLLAMA_TIMEOUT_S: "512"
      MODELS_DIR: "./models"

      DOCS_DIR: "/data/json"
      RAG_AUTO_INDEX: "false"
      RAG_REBUILD_ON_START: "false"
      RAG_INDEX_FAIL_FAST: "false"
      RAG_REINDEX_ENABLED: "true"
      RAG_AUDIT: "1"
      RAG_AUDIT_MAX_ATTEMPTS: "2"
      RAG_AUDIT_REWRITE: "1"

      LLM_PROVIDER: "ollama"
      EMBEDDING_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://ollama:11434"
      RAG_MODEL: "llama3.1:8b"
      AUDIT_MODEL: "llama3.1:8b"
      EMBEDDING_MODEL: "mxbai-embed-large"

      RAG_CHUNK_SIZE: "128"
      RAG_TOP_K: "16"

      CHROMA_DB_DIR: "/chroma"
      CHROMA_COLLECTION_NAME: "documents"
      RAG_CHROMA_SOURCE: "gdrive"
      RAG_CHROMA_GDRIVE_URL: ""
      RAG_CHROMA_S3_BUCKET: ""
      RAG_CHROMA_S3_PREFIX: "rag/chroma"
      RAG_CHROMA_LOCAL_DIR: "./chroma_db_seed"

      CURL_MAX_TIME: "512"
      CURL_RETRIES: "0"
      MAX_CHARS: "220"
      TZ_NAME: "Asia/Tokyo"
      PLACE: "Yokosuka, Kanagawa, JP"
      HASHTAGS: ""
      FEED_PATH: "frontend/app/public"
      LATEST_PATH: "frontend/app/public/latest.json"
      EXPO_PUBLIC_USE_SLOT: "1"
      EXPO_PUBLIC_SLOT_ROTATE_MS: "6500"
      EXPO_PUBLIC_SLOT_FADE_MS: "800"
      EXPO_PUBLIC_FEED_JSON_URL: ""
      EXPO_PUBLIC_SHARE_SD_INDEX_URL: ""
      EXPO_PUBLIC_FEEDBACK_FORM_URL: ""

      INPUT_IMAGE: ""
      MODE: "text2img"
      LORA_PATH: ""
      LORA_SCALE: "0"
      MIRROR_AUG: "0"
      STEPS: "6"
      GUIDANCE_SCALE: "2.0"
      PROMPT: "illustration, clear composition, soft lighting, suitable for an event post, scene in {place}. Inspired by: {core}"
      NEGATIVE: "photorealistic, text, watermark, logo, low quality, blurry, underexposed, too dark"

    outputs:
      changed: ${{ steps.publish.outputs.changed }}
      sha: ${{ steps.publish.outputs.sha }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download fixed entry artifact
        uses: actions/download-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state

      - name: Restore fixed entry state
        run: |
          set -euo pipefail
          mkdir -p frontend/app/public
          tar -C frontend/app/public -xzf /tmp/fixed-entry-state/fixed-entry-state.tgz

      - name: Create compose env file for illustrate
        run: |
          cat > /tmp/event-compose.env <<'EOF'
          BACKEND_PORT=8000
          AUTH_SECRET=
          AUTH_EXPIRE_MINUTES=60
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=app_db
          DB_USER=app_user
          DB_PASS=app_pass
          DATABASE_URL=postgresql+psycopg[binary]://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}

          EXPO_TUNNEL=false
          EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
          EXPO_PUBLIC_API_HOST=127.0.0.1
          EXPO_PUBLIC_API_PORT=8000
          EXPO_PUBLIC_API_BASE=http://127.0.0.1:8000
          EXPO_PUBLIC_FEED_URL=./latest.json
          EXPO_PUBLIC_GA_MEASUREMENT_ID=

          OLLAMA_TIMEOUT_S=512
          MODELS_DIR=./models

          DOCS_DIR=/data/json
          RAG_AUTO_INDEX=false
          RAG_REBUILD_ON_START=false
          RAG_INDEX_FAIL_FAST=false
          RAG_REINDEX_ENABLED=true
          RAG_AUDIT=1
          RAG_AUDIT_MAX_ATTEMPTS=2
          RAG_AUDIT_REWRITE=1

          LLM_PROVIDER=ollama
          EMBEDDING_PROVIDER=ollama
          OLLAMA_BASE_URL=http://ollama:11434
          RAG_MODEL=llama3.1:8b
          AUDIT_MODEL=llama3.1:8b
          EMBEDDING_MODEL=mxbai-embed-large

          RAG_CHUNK_SIZE=128
          RAG_TOP_K=16

          CHROMA_DB_DIR=/chroma
          CHROMA_COLLECTION_NAME=documents
          RAG_CHROMA_SOURCE=gdrive
          RAG_CHROMA_GDRIVE_URL=
          RAG_CHROMA_S3_BUCKET=
          RAG_CHROMA_S3_PREFIX=rag/chroma
          RAG_CHROMA_LOCAL_DIR=./chroma_db_seed

          LAT=35.2810
          LON=139.6722
          CURL_MAX_TIME=512
          CURL_RETRIES=0
          MAX_CHARS=220
          TZ_NAME=Asia/Tokyo
          PLACE=Yokosuka, Kanagawa, JP
          HASHTAGS=
          FEED_PATH=frontend/app/public
          LATEST_PATH=frontend/app/public/latest.json
          EXPO_PUBLIC_USE_SLOT=1
          EXPO_PUBLIC_SLOT_ROTATE_MS=6500
          EXPO_PUBLIC_SLOT_FADE_MS=800
          EXPO_PUBLIC_FEED_JSON_URL=
          EXPO_PUBLIC_SHARE_SD_INDEX_URL=
          EXPO_PUBLIC_FEEDBACK_FORM_URL=
          EOF

      - name: Build illustrate image
        env:
          REACT_NATIVE_PACKAGER_HOSTNAME: "127.0.0.1"
        run: |
          set -euo pipefail
          docker compose --env-file /tmp/event-compose.env -f docker-compose.yml build illustrate

      - name: Generate illustrated image and patch feed
        env:
          REACT_NATIVE_PACKAGER_HOSTNAME: "127.0.0.1"
          PATCH_JSON: "1"
          OUT_DIR: ""
          MIRROR_AUG: "1"
          SEED_OFFSET: "${{ github.run_number }}"
          SDXL_MODEL_ID: stabilityai/sdxl-turbo
        run: |
          set -euo pipefail
          test -f frontend/app/public/latest.json
          docker compose --env-file /tmp/event-compose.env -f docker-compose.yml run --rm illustrate

      - name: Package illustrated state
        id: publish
        run: |
          set -euo pipefail

          PUBLIC_DIR="frontend/app/public"
          LATEST_PATH_RESOLVED="$PUBLIC_DIR/latest.json"
          FEED_DIR_RESOLVED="$PUBLIC_DIR/feed"
          SNAPSHOT_DIR_RESOLVED="$PUBLIC_DIR/snapshot"
          IMAGE_DIR_RESOLVED="$PUBLIC_DIR/image"

          test -f "$LATEST_PATH_RESOLVED"
          test -d "$FEED_DIR_RESOLVED"

          STAGE_DIR=/tmp/fixed-entry-state
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR/feed" "$STAGE_DIR/snapshot" "$STAGE_DIR/image"
          cp "$LATEST_PATH_RESOLVED" "$STAGE_DIR/latest.json"

          if [ -d "$FEED_DIR_RESOLVED" ]; then
            cp -a "$FEED_DIR_RESOLVED"/. "$STAGE_DIR/feed/"
          fi

          if [ -d "$SNAPSHOT_DIR_RESOLVED" ]; then
            cp -a "$SNAPSHOT_DIR_RESOLVED"/. "$STAGE_DIR/snapshot/"
          fi

          if [ -d "$IMAGE_DIR_RESOLVED" ]; then
            cp -a "$IMAGE_DIR_RESOLVED"/. "$STAGE_DIR/image/"
          fi

          tar -C "$STAGE_DIR" -czf /tmp/fixed-entry-state.tgz .

          echo "changed=1" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload illustrated state
        if: steps.publish.outputs.changed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state.tgz
          if-no-files-found: error
          retention-days: 1

  stage_pages_state:
    needs: illustrate
    if: needs.illustrate.outputs.changed == '1'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download fixed entry artifact
        uses: actions/download-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state

      - name: Repack pages state artifact
        run: |
          set -euo pipefail
          rm -rf /tmp/pages-state
          mkdir -p /tmp/pages-state
          tar -C /tmp/pages-state -xzf /tmp/fixed-entry-state/fixed-entry-state.tgz
          tar -C /tmp/pages-state -czf /tmp/pages-state.tgz .

      - name: Upload pages state artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-state-${{ github.run_id }}
          path: /tmp/pages-state.tgz
          if-no-files-found: error
          retention-days: 1

  pages:
    needs: stage_pages_state
    uses: ./.github/workflows/pages.yml
    secrets: inherit
    with:
      ref: main
      state_artifact_name: pages-state-${{ github.run_id }}
      artifact_run_id: ${{ github.run_id }}
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
