name: Event Core

on:
  workflow_call:
    inputs:
      avatar_image:
        description: "Avatar image path under public/"
        required: false
        type: string
        default: "image/avatar/event.png"
    outputs:
      changed:
        description: "1 if feed files were updated"
        value: ${{ jobs.illustrate.outputs.changed }}
      sha:
        description: "Commit SHA that contains the generated feed"
        value: ${{ jobs.illustrate.outputs.sha }}

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        options: >-
          --health-cmd "ollama list >/dev/null 2>&1 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    outputs:
      changed: ${{ steps.generate.outputs.changed }}
      entry_json: ${{ steps.payload.outputs.entry_json }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Select Ollama model
        run: |
          set -euo pipefail
          echo "OLLAMA_CHAT_MODEL=qwen2.5:3b-instruct" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install requests

      - name: Wait for Ollama API
        run: |
          set -euo pipefail
          for _ in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:11434/api/tags >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Ollama API did not become ready on http://127.0.0.1:11434" >&2
          docker ps >&2 || true
          exit 1

      - name: Pull Ollama model
        run: |
          set -euo pipefail
          curl --fail --show-error \
            -H 'Content-Type: application/json' \
            http://127.0.0.1:11434/api/pull \
            -d "{\"name\":\"${OLLAMA_CHAT_MODEL}\",\"stream\":false}"

      - name: Warm up Ollama model
        run: |
          set -euo pipefail
          python - <<'PY' >/tmp/ollama_warmup.json
          import json
          import os

          payload = {
              "model": os.environ["OLLAMA_CHAT_MODEL"],
              "stream": False,
              "format": "json",
              "options": {"temperature": 0},
              "messages": [
                  {
                      "role": "user",
                      "content": 'Return only this JSON: {"ok": true}'
                  }
              ],
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY

          cat /tmp/ollama_warmup.json

          curl --fail --show-error \
            -H 'Content-Type: application/json' \
            http://127.0.0.1:11434/api/chat \
            --data-binary @/tmp/ollama_warmup.json >/dev/null

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv

      - name: Generate future event payload
        id: generate
        env:
          OLLAMA_BASE_URL: "http://127.0.0.1:11434"
          OLLAMA_MODEL: ${{ env.OLLAMA_CHAT_MODEL }}
          PROMPT_PATH: "scripts/prompt.txt"
          REQUEST_TIMEOUT: "300"
          MAX_RETRIES: "3"
          AVATAR_IMAGE: ${{ inputs.avatar_image }}
        run: |
          set -euo pipefail

          python scripts/generate_sentence.py | tee /tmp/event_sentence_raw.txt
          sentence="$(tail -n 1 /tmp/event_sentence_raw.txt | tr -d '\r')"

          if [ -z "${sentence}" ]; then
            echo "Generated sentence is empty" >&2
            echo "changed=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          sentence = Path("/tmp/event_sentence_raw.txt").read_text(encoding="utf-8").splitlines()[-1].strip()
          payload = {
              "kind": "event",
              "text": sentence,
              "avatar_image": os.environ.get("AVATAR_IMAGE", "image/avatar/event.png"),
              "links": [],
          }

          Path("/tmp/event_entry.json").write_text(
              json.dumps(payload, ensure_ascii=False),
              encoding="utf-8",
          )
          PY

          echo "changed=1" >> "$GITHUB_OUTPUT"

      - name: Export entry_json
        id: payload
        if: steps.generate.outputs.changed == '1'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload_path = Path("/tmp/event_entry.json")
          if not payload_path.exists():
              raise SystemExit(f"event entry JSON was not created: {payload_path}")

          payload = json.loads(payload_path.read_text(encoding='utf-8'))
          compact = json.dumps(payload, ensure_ascii=False)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"entry_json={compact}\n")
          PY

  fixed:
    needs: prepare
    if: needs.prepare.outputs.changed == '1'
    uses: ./.github/workflows/fixed_entry.yml
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      entry_json: ${{ needs.prepare.outputs.entry_json }}
    secrets: inherit

  illustrate:
    needs: fixed
    if: needs.fixed.outputs.changed == '1'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.publish.outputs.changed }}
      sha: ${{ steps.publish.outputs.sha }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download fixed entry artifact
        uses: actions/download-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state

      - name: Restore fixed entry state
        run: |
          set -euo pipefail
          mkdir -p frontend/app/public
          tar -C frontend/app/public -xzf /tmp/fixed-entry-state/fixed-entry-state.tgz

      - name: Choose style by JST hour
        id: style
        run: |
          set -euo pipefail
          HOUR=$(TZ=Asia/Tokyo date +%H)
          if [ "$HOUR" -ge 4 ] && [ "$HOUR" -lt 18 ]; then
            echo "use_camera=1" >> "$GITHUB_OUTPUT"
            echo "INPUT_IMAGE=snapshot.jpg" >> $GITHUB_ENV
            echo "MODE=img2img" >> $GITHUB_ENV
            echo "LORA_PATH=" >> $GITHUB_ENV
            echo "LORA_SCALE=0" >> $GITHUB_ENV
            echo "MIRROR_AUG=1" >> $GITHUB_ENV
            echo "STEPS=2" >> $GITHUB_ENV
            echo "STRENGTH=0.2" >> $GITHUB_ENV
            echo "GUIDANCE_SCALE=0.0" >> $GITHUB_ENV
            echo "PROMPT=" >> $GITHUB_ENV
            echo "NEGATIVE=" >> $GITHUB_ENV
          else
            echo "use_camera=0" >> $GITHUB_OUTPUT
            echo "INPUT_IMAGE=" >> $GITHUB_ENV
            echo "MODE=text2img" >> $GITHUB_ENV
            echo "LORA_PATH=models/loras/ukiyoe.safetensors" >> $GITHUB_ENV
            echo "LORA_SCALE=0.8" >> $GITHUB_ENV
            echo "STEPS=6" >> $GITHUB_ENV
            echo "GUIDANCE_SCALE=2.0" >> $GITHUB_ENV
            echo "PROMPT=ukiyo-e, Japanese woodblock print, Edo period, bold black outlines, flat colors, washi paper texture, woodgrain, traditional print, moonlit night with lantern light, clear visibility, scene in {place}. Inspired by: {core}" >> $GITHUB_ENV
            echo "NEGATIVE=photorealistic, realistic, 3d, CGI, anime, text, watermark, logo, low quality, blurry, underexposed, too dark" >> $GITHUB_ENV
          fi

      - name: Build illustrate image
        env:
          REACT_NATIVE_PACKAGER_HOSTNAME: "127.0.0.1"
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml build illustrate

      - name: Generate illustrated image and patch feed
        env:
          REACT_NATIVE_PACKAGER_HOSTNAME: "127.0.0.1"
          PATCH_JSON: "1"
          OUT_DIR: ""
          MIRROR_AUG: "1"
          SEED_OFFSET: "${{ github.run_number }}"
          SDXL_MODEL_ID: stabilityai/sdxl-turbo
        run: |
          set -euo pipefail
          test -f frontend/app/public/latest.json
          docker compose -f docker-compose.yml run --rm illustrate

      - name: Package illustrated state
        id: publish
        run: |
          set -euo pipefail

          PUBLIC_DIR="frontend/app/public"
          LATEST_PATH_RESOLVED="$PUBLIC_DIR/latest.json"
          FEED_DIR_RESOLVED="$PUBLIC_DIR/feed"
          SNAPSHOT_DIR_RESOLVED="$PUBLIC_DIR/snapshot"
          IMAGE_DIR_RESOLVED="$PUBLIC_DIR/image"

          test -f "$LATEST_PATH_RESOLVED"
          test -d "$FEED_DIR_RESOLVED"

          STAGE_DIR=/tmp/fixed-entry-state
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR/feed" "$STAGE_DIR/snapshot" "$STAGE_DIR/image"
          cp "$LATEST_PATH_RESOLVED" "$STAGE_DIR/latest.json"

          if [ -d "$FEED_DIR_RESOLVED" ]; then
            cp -a "$FEED_DIR_RESOLVED"/. "$STAGE_DIR/feed/"
          fi

          if [ -d "$SNAPSHOT_DIR_RESOLVED" ]; then
            cp -a "$SNAPSHOT_DIR_RESOLVED"/. "$STAGE_DIR/snapshot/"
          fi

          if [ -d "$IMAGE_DIR_RESOLVED" ]; then
            cp -a "$IMAGE_DIR_RESOLVED"/. "$STAGE_DIR/image/"
          fi

          tar -C "$STAGE_DIR" -czf /tmp/fixed-entry-state.tgz .

          echo "changed=1" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload illustrated state
        if: steps.publish.outputs.changed == '1'
        uses: actions/upload-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state.tgz
          if-no-files-found: error
          retention-days: 1

  stage_pages_state:
    needs: illustrate
    if: needs.illustrate.outputs.changed == '1'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download fixed entry artifact
        uses: actions/download-artifact@v4
        with:
          name: fixed-entry-state-${{ github.run_id }}
          path: /tmp/fixed-entry-state

      - name: Repack pages state artifact
        run: |
          set -euo pipefail
          rm -rf /tmp/pages-state
          mkdir -p /tmp/pages-state
          tar -C /tmp/pages-state -xzf /tmp/fixed-entry-state/fixed-entry-state.tgz
          tar -C /tmp/pages-state -czf /tmp/pages-state.tgz .

      - name: Upload pages state artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-state-${{ github.run_id }}
          path: /tmp/pages-state.tgz
          if-no-files-found: error
          retention-days: 1

  pages:
    needs: stage_pages_state
    uses: ./.github/workflows/pages.yml
    secrets: inherit
    with:
      ref: main
      state_artifact_name: pages-state-${{ github.run_id }}
      artifact_run_id: ${{ github.run_id }}
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
